<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Kos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'landing_page' %}" class="font-bold text-xl">🏠 Kos Mandiri</a>
            <div class="space-x-4">
                <a href="{% url 'landing_page' %}" class="hover:underline">Home</a>
                <a href="{% url 'room_list' %}" class="hover:underline">Daftar Kamar</a>
                <a href="/admin/" class="bg-white text-blue-600 px-4 py-2 rounded font-semibold hover:bg-gray-100">Admin Login</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-grow container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-300 py-6 text-center">
        <p>&copy; 2025 Kos Mandiri. Hak Cipta Dilindungi.</p>
    </footer>
</body>
</html>
